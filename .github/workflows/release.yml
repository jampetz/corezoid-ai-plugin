name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build MCP server binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: plugins/corezoid/mcp-server/go.mod
          cache: true

      - name: Build all platform binaries
        working-directory: plugins/corezoid/mcp-server
        run: |
          for GOOS in darwin linux; do
            for GOARCH in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -ldflags="-s -w" -o "convctl-${GOOS}-${GOARCH}" .
            done
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-binaries
          path: plugins/corezoid/mcp-server/convctl-*

  release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: mcp-binaries
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Pull the section between ## [VERSION] and the next ## heading
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a file to preserve newlines
          printf '%s\n' "$NOTES" > release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: dist/convctl-*
